<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">My Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .dashboard-header { background: var(--primary-color); color: white; padding: 40px 5%; text-align: center; }
        .dashboard-header h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .dashboard-content { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { margin-bottom: 30px; color: var(--text-color); font-size: 1.8rem; border-bottom: 2px solid #eee; padding-bottom: 10px;}

        /* Interactive Category Cards */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .service-card {
            background: white; border-radius: 12px; padding: 30px 20px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06); border: 1px solid #eee;
            cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }

        .service-card:hover {
            transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.12);
            border-color: var(--primary-color);
        }

        .service-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary-color); transform: scaleX(0); transition: transform 0.3s ease;
        }

        .service-card:hover::before { transform: scaleX(1); }

        .service-card h3 { color: var(--primary-color); margin-bottom: 10px; font-size: 1.4rem; }
        .service-card p { color: #666; font-size: 0.95rem; line-height: 1.5; }

        .empty-state { text-align: center; padding: 50px; color: #888; grid-column: 1 / -1; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">ServiceFinder</a>
    <nav class="nav-links">
        <a href="my-bookings" style="font-weight: bold;">My Bookings</a>
        <a href="#" id="logoutBtn" class="btn-primary" style="background-color: #dc3545;">Logout</a>
    </nav>
</header>

<div class="dashboard-header">
    <h1>Welcome to Your Dashboard</h1>
    <p>What do you need help with today?</p>
</div>

<div class="dashboard-content">
    <h2 class="section-title">Select a Service to Book</h2>

    <div class="services-grid" id="servicesGrid">
        <p class="empty-state">Loading available services...</p>
    </div>
</div>

<script th:src="@{/js/user-dashboard.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container { max-width: 800px; margin: 50px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .section-title { grid-column: 1 / -1; margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; color: var(--primary-color); }

        #messageBox { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; text-align: center; }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error-msg { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .auth-links { grid-column: 1 / -1; text-align: center; margin-top: 20px; font-size: 0.95rem; }
        .auth-links a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">ServiceFinder</a>
    <nav class="nav-links">
        <a href="/login">Login</a>
        <a href="/provider-signup" class="btn-primary">Become a Professional</a>
    </nav>
</header>

<div class="form-container">
    <h2 style="text-align: center;">Create an Account</h2>
    <p style="text-align: center; color: #666; margin-bottom: 20px;">Sign up to book trusted local professionals in seconds.</p>

    <form id="userSignUpForm">
        <div class="form-grid">

            <h3 class="section-title">Personal Details</h3>

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="cellPhone">Cell Phone</label>
                <input type="text" id="cellPhone" required>
            </div>

            <div class="form-group full-width">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <h3 class="section-title">Service Address</h3>

            <div class="form-group full-width">
                <label for="addressLine1">Address Line 1</label>
                <input type="text" id="addressLine1" required placeholder="House/Flat No. and Street">
            </div>

            <div class="form-group full-width">
                <label for="addressLine2">Address Line 2 (Optional)</label>
                <input type="text" id="addressLine2" placeholder="Landmark or Area">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" required>
            </div>

            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" required>
            </div>

            <div class="form-group">
                <label for="zipCode">Zip Code</label>
                <input type="text" id="zipCode" required>
            </div>

            <div class="form-group">
                <label for="addressType">Address Type</label>
                <select id="addressType" required>
                    <option value="Home">Home</option>
                    <option value="Office">Office</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group full-width">
                <button type="submit" class="search-btn" style="width: 100%; margin-top: 15px;" id="submitBtn">Create Account</button>
            </div>

            <div class="auth-links">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>
    </form>

    <div id="messageBox"></div>
</div>

<script th:src="@{/js/signup.js}"></script>
</body>
</html>

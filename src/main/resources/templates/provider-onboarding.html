<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Complete Provider Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container { max-width: 800px; margin: 50px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .section-title { grid-column: 1 / -1; margin-top: 20px; margin-bottom: 10px; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; color: var(--primary-color); }

        /* Checkbox Grid */
        .checkbox-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; background: #f9f9f9; border-radius: 5px; border: 1px solid #ddd; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        .checkbox-item input { width: 18px; height: 18px; cursor: pointer; }

        /* Dynamic Schedule Styles */
        .schedule-row { display: flex; gap: 15px; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #ddd; }
        .schedule-row .form-group { margin-bottom: 0; flex: 1; }
        .remove-btn { background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 24px; }
        .add-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; margin-top: 10px; }

        #messageBox { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error-msg { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">ServiceFinder</a>
</header>

<div class="form-container">
    <h2>Complete Your Profile</h2>
    <p>Step 2: Tell us about the services you offer and your availability.</p>

    <form id="onboardingForm">
        <div class="form-grid">

            <h3 class="section-title">Professional Details</h3>

            <div class="form-group full-width">
                <label>Select Services You Offer</label>
                <div class="checkbox-grid" id="categoryContainer">
                    <div class="checkbox-item"><input type="checkbox" name="category" value="1"> AC Repair</div>
                    <div class="checkbox-item"><input type="checkbox" name="category" value="2"> Plumbing</div>
                    <div class="checkbox-item"><input type="checkbox" name="category" value="3"> Electrical</div>
                    <div class="checkbox-item"><input type="checkbox" name="category" value="4"> Cleaning</div>
                    <div class="checkbox-item"><input type="checkbox" name="category" value="5"> Carpentry</div>
                    <div class="checkbox-item"><input type="checkbox" name="category" value="6"> Painting</div>
                </div>
            </div>

            <div class="form-group">
                <label for="experienceYears">Years of Experience</label>
                <input type="number" id="experienceYears" min="0" required>
            </div>

            <div class="form-group">
                <label for="hourlyRate">Hourly Rate (₹)</label>
                <input type="number" id="hourlyRate" step="0.01" min="1" required>
            </div>

            <div class="form-group full-width">
                <label for="bio">Professional Bio</label>
                <textarea id="bio" rows="4" placeholder="Describe your skills and experience..." required></textarea>
            </div>

            <h3 class="section-title">Availability Schedule</h3>
            <div class="form-group full-width">
                <div id="scheduleContainer">
                    <div class="schedule-row">
                        <div class="form-group">
                            <label>Day</label>
                            <select class="day-input" required>
                                <option value="MONDAY">Monday</option>
                                <option value="TUESDAY">Tuesday</option>
                                <option value="WEDNESDAY">Wednesday</option>
                                <option value="THURSDAY">Thursday</option>
                                <option value="FRIDAY">Friday</option>
                                <option value="SATURDAY">Saturday</option>
                                <option value="SUNDAY">Sunday</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Start Time</label>
                            <input type="time" class="start-time-input" required>
                        </div>
                        <div class="form-group">
                            <label>End Time</label>
                            <input type="time" class="end-time-input" required>
                        </div>
                    </div>
                </div>
                <button type="button" class="add-btn" id="addScheduleBtn">+ Add Another Day</button>
            </div>

            <div class="form-group full-width">
                <button type="submit" class="search-btn" style="width: 100%; margin-top: 20px;" id="submitBtn">Complete Onboarding</button>
            </div>
        </div>
    </form>

    <div id="messageBox"></div>
</div>

<script th:src="@{/js/provider-onboarding.js}"></script>
</body>
</html>

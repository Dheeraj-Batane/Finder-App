<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://js.stripe.com/v3/"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">My Bookings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-header { background: var(--primary-color); color: white; padding: 30px 5%; display: flex; align-items: center; gap: 20px;}
        .back-btn { background: white; color: var(--primary-color); text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 0.9rem;}

        .content-container { padding: 40px 5%; max-width: 1000px; margin: 0 auto; }

        .bookings-grid { display: grid; gap: 20px; }

        .booking-card {
            background: white; border-radius: 10px; padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px;
        }

        .booking-info { flex: 1; min-width: 250px;}
        .service-title { font-size: 1.3rem; color: var(--primary-color); font-weight: bold; margin-bottom: 5px;}
        .provider-name { font-size: 1rem; color: #555; margin-bottom: 10px;}

        .datetime-box { display: flex; gap: 20px; font-size: 0.95rem; color: #444; background: #f9f9f9; padding: 10px; border-radius: 5px; display: inline-flex;}
        .datetime-box span { font-weight: bold; color: #333;}

        .status-badge {
            padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Status Colors */
        .status-PENDING { background: #fff3cd; color: #856404; border: 1px solid #ffeeba;}
        .status-CONFIRMED { background: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
        .status-COMPLETED { background: #cce5ff; color: #004085; border: 1px solid #b8daff;}
        .status-CANCELLED { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}

        .empty-state { text-align: center; padding: 50px; color: #888; background: white; border-radius: 10px; border: 1px dashed #ccc;}
        #loadingMsg { text-align: center; font-size: 1.2rem; color: #555; padding: 50px; }
        /* Review Modal Specific Styles */
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 5px; margin-bottom: 15px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2rem; color: #ccc; cursor: pointer; transition: 0.2s; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: #ffc107; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; resize: vertical; }
        /* Submitted Review Styles */
        .submitted-review { background: #fdfbf7; border: 1px solid #ffeeba; padding: 12px; border-radius: 8px; margin-top: 15px; width: 100%;}
        .static-stars { color: #ffc107; font-size: 1.2rem; margin-bottom: 5px; letter-spacing: 2px;}
        .review-text { font-size: 0.9rem; color: #555; font-style: italic; line-height: 1.4;}
        /* Stripe Payment Modal Styles */
        #card-element { padding: 12px; border: 1px solid #ccc; border-radius: 5px; background: white; margin-bottom: 15px;}
        #card-errors { color: #721c24; font-size: 0.85rem; margin-top: 5px; text-align: center;}
    </style>
</head>
<body>

<header>
    <a href="/user-dashboard" class="logo">ServiceFinder</a>
    <nav class="nav-links">
        <a href="/user-dashboard">Dashboard</a>
        <a href="#" id="logoutBtn" class="btn-primary" style="background-color: #dc3545;">Logout</a>
    </nav>
</header>

<div class="page-header">
    <a href="/user-dashboard" class="back-btn">&larr; Back</a>
    <h1>My Bookings</h1>
</div>

<div class="content-container">
    <div id="loadingMsg">Loading your appointments...</div>
    <div class="bookings-grid" id="bookingsGrid" style="display: none;">
    </div>
</div>
<div id="reviewModal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
    <div class="modal-content" style="background-color: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 450px; position: relative;">
        <span class="close-modal" id="closeReviewModalBtn" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888; font-weight: bold;">&times;</span>
        <h2 style="color: var(--primary-color); margin-bottom: 5px;">Leave a Review</h2>
        <p id="reviewProviderName" style="color: #666; margin-bottom: 20px; font-size: 0.95rem;"></p>

        <form id="reviewForm">
            <input type="hidden" id="reviewBookingId">

            <label style="font-weight: bold; font-size: 0.9rem;">Rating</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="stars" value="5" required/><label for="star5" title="5 stars">★</label>
                <input type="radio" id="star4" name="stars" value="4"/><label for="star4" title="4 stars">★</label>
                <input type="radio" id="star3" name="stars" value="3"/><label for="star3" title="3 stars">★</label>
                <input type="radio" id="star2" name="stars" value="2"/><label for="star2" title="2 stars">★</label>
                <input type="radio" id="star1" name="stars" value="1"/><label for="star1" title="1 star">★</label>
            </div>

            <div class="form-group">
                <label for="reviewComments" style="font-weight: bold; font-size: 0.9rem;">Comments</label>
                <textarea id="reviewComments" rows="4" placeholder="How was the service?" required></textarea>
            </div>

            <button type="submit" class="search-btn" style="width: 100%; margin-top: 10px;" id="submitReviewBtn">Submit Review</button>
        </form>
        <div id="reviewMessageBox" style="margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-size: 0.9rem; text-align: center;"></div>
    </div>
</div>
<div id="paymentModal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
    <div class="modal-content" style="background-color: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 450px; position: relative;">
        <span class="close-modal" id="closePaymentModalBtn" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888; font-weight: bold;">&times;</span>
        <h2 style="color: var(--primary-color); margin-bottom: 5px;">Secure Payment</h2>
        <p id="paymentProviderName" style="color: #666; margin-bottom: 20px; font-size: 0.95rem;"></p>

        <form id="paymentForm">
            <input type="hidden" id="paymentBookingId">

            <label style="font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; display: block;">Credit or Debit Card</label>
            <div id="card-element"></div>
            <div id="card-errors" role="alert"></div>

            <button type="submit" class="search-btn" style="width: 100%; margin-top: 15px; background-color: #28a745;" id="submitPaymentBtn" disabled>Pay Now</button>
        </form>
        <div id="paymentMessageBox" style="margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-size: 0.9rem; text-align: center;"></div>
    </div>
</div>
<script th:src="@{/js/my-bookings.js}"></script>
</body>
</html>

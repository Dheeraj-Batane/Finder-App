<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container { max-width: 450px; margin: 80px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .form-group label { margin-bottom: 5px; font-weight: 500; }
        .form-group input { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        #messageBox { margin-top: 15px; padding: 15px; border-radius: 5px; display: none; text-align: center; }
        .error-msg { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .auth-links { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .auth-links a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">ServiceFinder</a>
    <nav class="nav-links">
        <a href="/signup">Sign Up</a>
    </nav>
</header>

<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 20px;">Welcome Back</h2>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter your password">
        </div>

        <button type="submit" class="search-btn" style="width: 100%;" id="loginBtn">Login</button>
    </form>

    <div id="messageBox"></div>

    <div class="auth-links">
        Don't have an account? <a href="/signup">Sign up here</a>
    </div>
</div>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
